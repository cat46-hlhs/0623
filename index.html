<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊 - Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <div class="main-content">
                <canvas id="gameCanvas" width="240" height="400"></canvas>
                <div class="info-panel">
                    <div class="score-box">
                        <h3>分數</h3>
                        <p id="score">0</p>
                    </div>
                    <div class="level-box">
                        <h3>等級</h3>
                        <p id="level">1</p>
                    </div>
                    <div class="lines-box">
                        <h3>消除行數</h3>
                        <p id="lines">0</p>
                    </div>
                    <div class="next-box">
                        <h3>下一個</h3>
                        <canvas id="nextCanvas" width="80" height="80"></canvas>
                    </div>
                    <button id="startBtn" class="btn">開始遊戲</button>
                    <button id="pauseBtn" class="btn" disabled>暫停</button>
                    <button id="resetBtn" class="btn">重新開始</button>
                </div>
            </div>
        </div>
        <div class="controls">
            <h3>操作說明</h3>
            <p>⬅️ ➡️ : 左右移動</p>
            <p>⬇️ : 加速下落</p>
            <p>⬆️ : 旋轉方塊</p>
            <p>空白鍵 : 立即落下</p>
            <p>P : 暫停/繼續</p>
        </div>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
